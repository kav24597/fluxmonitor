spring.application.name=monitor
server.port=8080

# JWT
jwt.secret=FluxMonitor2026SuperSecretKeyMustBe32CharsLong!
jwt.expiration=86400000

# H2 File Database (persists across restarts)
spring.datasource.url=jdbc:h2:file:${user.home}/fluxmonitor-db;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Console (browser access)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false
server.port=${PORT:8080}